<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World App</title>
    <style>
        /* Reset default margins and center everything */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden; /* Prevents scrollbars if particles fly offscreen */
            position: relative;
        }

        /* Canvas overlay for fireworks */
        #fireworksCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allows clicking through the canvas to the button */
            z-index: 1;
        }

        /* Create a beautiful glassmorphism card */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 2; /* Keeps the card sitting cleanly above the fireworks */
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.5rem;
            color: #4a00e0;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* Style an interactive button */
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #6ae, #4a00e0);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(74, 0, 224, 0.3);
            transition: all 0.2s ease;
        }

        .btn:hover {
            opacity: 0.9;
            box-shadow: 0 6px 20px rgba(74, 0, 224, 0.5);
        }

        /* A small hidden message styling */
        #secret-message {
            margin-top: 20px;
            font-size: 0.95rem;
            color: #2e7d32;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <div class="card">
        <h1>Hello World!</h1>
        <p>Allen Gabriel R. Moral,Rohnel Rotoni,Kaily Rada,Edna Dela Cruz,Alhona Moreno,Sheryl Rollan</p>
        <p>Seminar Activity</p>
        <p>Seminar Activity</p>
        
        <button class="btn" onclick="revealMagic()">Click for Magic</button>
        
        <div id="secret-message">🎉Congratulations to our first deployment🎉</div>
    </div>

    <script>
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        // Match canvas size to the browser window
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let particles = [];

        // Particle Blueprint Class
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                // Random angle and speed for the explosion blast
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.velocityX = Math.cos(angle) * speed;
                this.velocityY = Math.sin(angle) * speed;
                this.alpha = 1; // Used to fade out over time
                this.decay = Math.random() * 0.015 + 0.015;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.velocityX;
                this.y += this.velocityY;
                this.velocityY += 0.05; // Simulates gravity pulling them down
                this.alpha -= this.decay;
            }
        }

        // Creates a burst of multiple particles
        function createFirework(x, y) {
            const colors = ['#FF5733', '#FFC300', '#DAF7A6', '#FF33FF', '#33FFF0', '#33FF57'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle(x, y, randomColor));
            }
        }

        // The animation loop that constantly renders the movement
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach((particle, index) => {
                if (particle.alpha <= 0) {
                    particles.splice(index, 1);
                } else {
                    particle.update();
                    particle.draw();
                }
            });

            requestAnimationFrame(animate);
        }

        // Run the background loop continuously
        animate();

        // Main action triggered when button is clicked
        function revealMagic() {
            // Show the text
            const message = document.getElementById('secret-message');
            message.style.opacity = '1';

            // Trigger random fireworks across the screen instantly
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const randomX = Math.random() * canvas.width;
                    const randomY = Math.random() * (canvas.height * 0.6); // keep them in upper 60% of screen
                    createFirework(randomX, randomY);
                }, i * 300); // Delays each firework slightly for a staggered effect
            }
        }
    </script>

</body>
</html>
